<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chunker output visualization</title>
  <style>
    :root {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      color: #111;
      background: #fff;
    }
    body { max-width: 78rem; margin: 3rem auto; padding: 0 2rem 4rem; }
    h1 { font-weight: 100; font-size: 2.5rem; letter-spacing: -0.02em; margin: 0 0 0.5rem; }
    p.subtitle { color: #666; font-size: 1rem; margin: 0 0 2rem; }

    .controls {
      display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem;
      padding-bottom: 1.5rem; border-bottom: 1px solid #e5e5e5;
    }
    .controls label { font-size: 0.875rem; color: #666; }
    .controls input[type="number"] {
      width: 8rem; padding: 0.5rem 0.75rem; font-size: 0.875rem;
      border: 1px solid #ccc; border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    }
    .controls button {
      padding: 0.5rem 1rem; font-size: 0.875rem;
      background: #111; color: #fff; border: 0; border-radius: 4px; cursor: pointer;
    }
    .controls button.secondary { background: #fff; color: #111; border: 1px solid #ccc; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    .panel h2 {
      font-weight: 500; font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 0.1em; color: #666; margin: 0 0 1rem;
    }

    .source {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 0.8125rem; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
      border: 1px solid #e5e5e5; border-radius: 6px;
      padding: 1.25rem; max-height: 38rem; overflow-y: auto;
      background: #fafafa;
    }
    .para-break { display: block; height: 0.5em; }

    .chunks {
      display: flex; flex-direction: column; gap: 0.75rem;
      max-height: 38rem; overflow-y: auto;
    }
    .chunk {
      border: 1px solid #e5e5e5; border-radius: 6px; padding: 1rem 1.25rem;
      background: #fff;
    }
    .chunk-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 0.5rem;
    }
    .chunk-num {
      font-size: 0.6875rem; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.1em; color: #666;
    }
    .chunk-count {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 0.8125rem; color: #111;
    }
    .chunk-bar {
      height: 6px; background: #f0f0f0; border-radius: 3px;
      overflow: hidden; margin-bottom: 0.75rem;
    }
    .chunk-fill { height: 100%; background: #111; }
    .chunk-fill.warn { background: #c2410c; }
    .chunk-fill.over { background: #991b1b; }
    .chunk-preview {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 0.75rem; line-height: 1.55; color: #555;
      max-height: 4.5em; overflow: hidden; position: relative;
    }
    .chunk-preview::after {
      content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 1.5em;
      background: linear-gradient(to bottom, transparent, #fff);
    }
  </style>
</head>
<body>
  <h1>Chunker output, by character count</h1>
  <p class="subtitle">Demonstrates how the audiobook pipeline's chunker splits text on natural boundaries while keeping every chunk under a hard cap. Bar fill shows each chunk's length against the cap.</p>

  <div class="controls">
    <label>Cap (chars):
      <input type="number" id="cap" value="500" min="50" max="20000" step="50">
    </label>
    <button id="rechunk">Re-chunk</button>
    <button class="secondary" id="reset">Reset sample text</button>
  </div>

  <div class="layout">
    <div class="panel">
      <h2>Source text</h2>
      <div class="source" id="source" contenteditable="true" spellcheck="false"></div>
    </div>
    <div class="panel">
      <h2>Chunks <span id="chunkCount" style="color:#999; font-weight: normal;"></span></h2>
      <div class="chunks" id="chunks"></div>
    </div>
  </div>

  <script>
    const SAMPLE = `Chapter one. The lighthouse keeper had not slept in three days.

She watched the storm from the lamp room, hand resting on the brass railing, and listened to the rhythm of the rotating beam. The keeper's log lay open on the desk, half-filled, ink still wet on the last entry.

Below, the surf battered the rocks the way it had every winter for two hundred years. She knew the sound the way other people know a heartbeat. The light would have to keep turning. That was the whole job, the only job, the job that came before sleeping and after sleeping and instead of sleeping.

She poured the cup of coffee that had gone cold an hour ago and drank it anyway. The watch on her wrist read four in the morning. Outside, the wind had picked up again.`;

    const source = document.getElementById("source");
    const chunksEl = document.getElementById("chunks");
    const chunkCountEl = document.getElementById("chunkCount");
    const capInput = document.getElementById("cap");

    function chunkText(text, maxChars) {
      const paragraphs = text.split(/\n\n+/).map(p => p.trim()).filter(Boolean);
      const chunks = [];
      let buf = "";

      for (const para of paragraphs) {
        if (buf.length + para.length + 2 <= maxChars) {
          buf = buf ? `${buf}\n\n${para}` : para;
          continue;
        }
        if (buf) { chunks.push(buf); buf = ""; }
        if (para.length > maxChars) {
          const sentences = para.split(/(?<=[.!?])\s+/);
          for (const sent of sentences) {
            if (buf.length + sent.length + 1 <= maxChars) {
              buf = buf ? `${buf} ${sent}` : sent;
            } else {
              if (buf) chunks.push(buf);
              buf = sent;
            }
          }
        } else {
          buf = para;
        }
      }
      if (buf) chunks.push(buf);
      return chunks;
    }

    function render() {
      const text = source.innerText;
      const cap = Math.max(50, parseInt(capInput.value, 10) || 500);
      const chunks = chunkText(text, cap);

      chunkCountEl.textContent = `(${chunks.length})`;
      chunksEl.innerHTML = chunks.map((c, i) => {
        const pct = Math.min(100, Math.round((c.length / cap) * 100));
        const cls = pct > 100 ? "over" : pct > 85 ? "warn" : "";
        const preview = c.replace(/\n/g, " ").slice(0, 280);
        return `
          <div class="chunk">
            <div class="chunk-head">
              <span class="chunk-num">Chunk ${String(i).padStart(2, "0")}</span>
              <span class="chunk-count">${c.length} / ${cap} chars</span>
            </div>
            <div class="chunk-bar">
              <div class="chunk-fill ${cls}" style="width: ${pct}%"></div>
            </div>
            <div class="chunk-preview">${preview}</div>
          </div>`;
      }).join("");
    }

    function reset() {
      source.innerText = SAMPLE;
      render();
    }

    document.getElementById("rechunk").addEventListener("click", render);
    document.getElementById("reset").addEventListener("click", reset);
    source.addEventListener("input", () => {
      // debounce
      clearTimeout(window._rt);
      window._rt = setTimeout(render, 250);
    });

    reset();
  </script>
</body>
</html>
